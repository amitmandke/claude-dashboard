<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Launch a Claude session</title>
  <style>
    :root {
      --bg: #1b1d22; --panel: #24272e; --border: #353a44;
      --fg: #e6e8ec; --muted: #9aa3b2; --accent: #4f8cff; --accent-fg: #fff;
      --danger: #e5534b; --ok: #3fb950; --code: #11131a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--fg);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 560px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 12px; padding: 24px 28px;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 20px; font-size: 13px; }
    .field { margin-bottom: 14px; }
    .label { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin-bottom: 4px; }
    .value {
      background: var(--code); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px; white-space: pre-wrap; word-break: break-word;
    }
    .value.empty { color: var(--muted); font-style: italic; }
    .actions { display: flex; gap: 10px; margin-top: 22px; }
    button {
      flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
      font-size: 14px; font-weight: 600; cursor: pointer; background: var(--panel); color: var(--fg);
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
    button:disabled { opacity: .5; cursor: default; }
    .status { margin-top: 18px; font-size: 14px; min-height: 20px; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Launch a Claude session</h1>
    <p class="sub">Review the target, then launch. Nothing runs until you click <b>Launch</b>.</p>

    <div class="field">
      <div class="label">Directory</div>
      <div class="value" id="v-cwd"></div>
    </div>
    <div class="field" id="f-skill" hidden>
      <div class="label">Skill</div>
      <div class="value" id="v-skill"></div>
    </div>
    <div class="field">
      <div class="label" id="l-prompt">Prompt</div>
      <div class="value" id="v-prompt"></div>
    </div>

    <div class="actions">
      <button id="cancel">Cancel</button>
      <button id="candidate">Add to candidates</button>
      <button id="launch" class="primary">Launch now</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script>
    const q = new URLSearchParams(location.search);
    const cwd = (q.get('cwd') || '').trim();
    const skill = (q.get('skill') || '').trim();
    const prompt = (q.get('prompt') || '').trim();

    const $ = (id) => document.getElementById(id);
    const setVal = (el, text) => {
      if (text) { el.textContent = text; el.classList.remove('empty'); }
      else { el.textContent = '(none)'; el.classList.add('empty'); }
    };

    setVal($('v-cwd'), cwd);
    setVal($('v-prompt'), prompt);
    if (skill) {
      $('f-skill').hidden = false;
      setVal($('v-skill'), '/' + skill);
      $('l-prompt').textContent = 'Arguments';
    }

    const status = $('status');
    const launchBtn = $('launch');
    const candidateBtn = $('candidate');

    if (!cwd) {
      status.textContent = 'Missing required "cwd" parameter.';
      status.className = 'status err';
      launchBtn.disabled = true;
      candidateBtn.disabled = true;
    }

    $('cancel').addEventListener('click', () => window.close());

    // POST helper shared by both buttons: disable, show progress, report result.
    async function submit(path, busyMsg, okHtml, body) {
      launchBtn.disabled = candidateBtn.disabled = true;
      status.className = 'status';
      status.textContent = busyMsg;
      try {
        const res = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
        status.className = 'status ok';
        status.innerHTML = okHtml;
      } catch (e) {
        status.className = 'status err';
        status.textContent = 'Failed: ' + e.message;
        launchBtn.disabled = candidateBtn.disabled = false;
      }
    }

    // Launch now: spawns immediately. Add to candidates: stages it in the
    // launchable list so you can review/reprioritize and launch it later.
    launchBtn.addEventListener('click', () =>
      submit('/api/sessions/new', 'Launching…',
        'Launched — it will appear in the <a href="/">dashboard</a> shortly.',
        { cwd, skill, prompt }));

    candidateBtn.addEventListener('click', () =>
      submit('/api/candidates', 'Adding…',
        'Added — review it under <a href="/">Candidates</a> in the dashboard.',
        { cwd, skill, prompt, source: 'manual' }));
  </script>
</body>
</html>
